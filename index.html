<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 분야 트래커</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e5e3dc;
    --border-strong: #ccc9be;
    --text: #1a1a18;
    --text-muted: #6b6860;
    --text-hint: #9e9b91;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --up: #dc2626;
    --down: #16a34a;
    --tag-bg: #f0ede6;
    --tag-text: #44423c;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { font-size: 16px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

  .status-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1.25rem; font-size: 13px; color: var(--text-muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #16a34a; flex-shrink: 0; }
  .dot.loading { background: #d97706; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .tabs { display: flex; gap: 2px; margin-bottom: 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; width: fit-content; }
  .tab { padding: 7px 16px; border-radius: var(--radius-sm); border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .tab:hover { color: var(--text); background: var(--bg); }
  .tab.active { background: var(--accent); color: #fff; }
  .tab i { font-size: 15px; }

  .section { display: none; }
  .section.active { display: block; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .metric-label { font-size: 11px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .metric-value { font-size: 26px; font-weight: 700; letter-spacing: -1px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }

  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--bg); }
  thead th:first-child { border-radius: var(--radius) 0 0 0; }
  thead th:last-child { border-radius: 0 var(--radius) 0 0; }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover { background: var(--bg); }
  tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  .ticker-cell { font-family: 'SF Mono', 'Fira Code', monospace; font-weight: 700; font-size: 13px; color: var(--accent); }
  .price-cell { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
  .change-cell { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; font-weight: 600; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--text-hint); }

  .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--tag-bg); color: var(--tag-text); border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 500; margin: 2px; }
  .tag-rm { background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 13px; padding: 0; line-height: 1; }
  .tag-rm:hover { color: var(--up); }

  .tag-input-area { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); min-height: 42px; cursor: text; transition: border-color 0.15s; }
  .tag-input-area:focus-within { border-color: var(--accent); outline: none; }
  .tag-input-area input { border: none; outline: none; background: none; font-size: 14px; min-width: 120px; flex: 1; color: var(--text); }

  .preset-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .preset-tag { background: none; border: 1px dashed var(--border-strong); border-radius: 20px; padding: 2px 10px; font-size: 11px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
  .preset-tag:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  .form-group { margin-bottom: 1rem; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; }
  input[type=text] { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
  input[type=text]:focus { border-color: var(--accent); }
  select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface); color: var(--text); outline: none; cursor: pointer; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { color: var(--up); }
  .btn-danger:hover { background: #fef2f2; border-color: #fca5a5; }

  .search-result { margin-bottom: 1rem; }
  .sector-label { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--bg); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-hint); }
  .empty-state i { font-size: 36px; margin-bottom: 8px; display: block; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .base-stock-info { background: var(--accent-light); border: 1px solid #bfdbfe; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

  @media (max-width: 640px) {
    .two-col { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: 1fr 1fr; }
    .header-actions .btn span { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">주식 분야 <span>트래커</span></div>
    <div class="header-actions">
      <button class="btn btn-sm" onclick="exportCSV()"><i class="ti ti-download"></i> <span>Export CSV</span></button>
      <label class="btn btn-sm" style="cursor:pointer;"><i class="ti ti-upload"></i> <span>Import CSV</span><input type="file" accept=".csv" style="display:none" onchange="importCSV(this)"></label>
    </div>
  </div>
</div>

<div class="main">

  <div class="status-bar">
    <span class="dot" id="dot"></span>
    <span id="statusText">앱 로드 완료</span>
    <span id="lastUpdate" style="margin-left:auto;font-size:12px;"></span>
    <button class="btn btn-sm" onclick="updateAllPrices()" style="margin-left:8px;"><i class="ti ti-refresh"></i> 주가 업데이트</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('list',this)"><i class="ti ti-table"></i> 종목 목록</button>
    <button class="tab" onclick="switchTab('add',this)"><i class="ti ti-plus"></i> 종목 추가</button>
    <button class="tab" onclick="switchTab('search',this)"><i class="ti ti-git-branch"></i> 연관 종목 조회</button>
  </div>

  <!-- 종목 목록 -->
  <div id="tab-list" class="section active">
    <div class="metrics">
      <div class="metric"><div class="metric-label">총 종목</div><div class="metric-value" id="m-total">0</div></div>
      <div class="metric"><div class="metric-label">분야 수</div><div class="metric-value" id="m-sectors">0</div></div>
      <div class="metric"><div class="metric-label">상승 종목</div><div class="metric-value up" id="m-up">0</div></div>
      <div class="metric"><div class="metric-label">하락 종목</div><div class="metric-value down" id="m-down">0</div></div>
    </div>
    <div class="card" style="overflow:hidden;">
      <table>
        <thead><tr>
          <th>티커</th><th>종목명</th><th>분야</th><th>현재가</th><th>등락률</th><th></th>
        </tr></thead>
        <tbody id="stockBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 종목 추가 -->
  <div id="tab-add" class="section">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;">
      <div>
        <div class="card" style="padding:1.25rem;">
          <p style="font-weight:700;font-size:15px;margin-bottom:1rem;">새 종목 추가</p>
          <div class="two-col" style="gap:8px;margin-bottom:1rem;">
            <div class="form-group" style="margin:0;">
              <label class="form-label">티커</label>
              <input type="text" id="newTicker" placeholder="예: NVDA" style="text-transform:uppercase;">
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label">종목명</label>
              <input type="text" id="newName" placeholder="예: 엔비디아">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">분야 태그 <span style="font-weight:400;color:var(--text-hint)">(입력 후 Enter)</span></label>
            <div class="tag-input-area" id="tagWrap" onclick="document.getElementById('tagInput').focus()">
              <input type="text" id="tagInput" placeholder="분야 입력..." onkeydown="handleTagInput(event)">
            </div>
            <div class="preset-tags" id="presetArea"></div>
          </div>
          <button class="btn btn-primary" style="width:100%;" onclick="addStock()"><i class="ti ti-plus"></i> 종목 추가</button>
        </div>
      </div>
      <div>
        <div class="card" style="padding:1.25rem;">
          <p style="font-weight:700;font-size:15px;margin-bottom:6px;">샘플 데이터</p>
          <p style="font-size:13px;color:var(--text-muted);margin-bottom:1rem;">미국 주요 종목 14개를 빠르게 불러옵니다.</p>
          <button class="btn" style="width:100%;margin-bottom:10px;" onclick="loadSample()"><i class="ti ti-database-import"></i> 샘플 데이터 로드</button>
          <p style="font-size:11px;color:var(--text-hint);">포함 종목: NVDA, AMD, MSFT, GOOGL, AMZN, AVGO, ANET, SMCI, TSM, TSLA, META, PANW, PLTR, INTC</p>
        </div>
        <div class="card" style="padding:1.25rem;margin-top:12px;">
          <p style="font-weight:700;font-size:15px;margin-bottom:6px;">엑셀 연동 방법</p>
          <ol style="font-size:13px;color:var(--text-muted);padding-left:1.2rem;line-height:2;">
            <li>Export CSV → 엑셀에서 편집</li>
            <li>편집 완료 후 CSV로 저장</li>
            <li>Import CSV로 다시 불러오기</li>
          </ol>
        </div>
      </div>
    </div>
  </div>

  <!-- 연관 종목 조회 -->
  <div id="tab-search" class="section">
    <div class="card" style="padding:1.25rem;margin-bottom:1.25rem;">
      <p style="font-weight:700;font-size:15px;margin-bottom:1rem;">연관 종목 조회</p>
      <div style="display:flex;gap:8px;">
        <select id="searchTicker" style="flex:1;"></select>
        <button class="btn btn-primary" onclick="searchRelated()"><i class="ti ti-search"></i> 조회</button>
      </div>
    </div>
    <div id="searchResults"></div>
  </div>

</div>

<script>
let stocks = JSON.parse(localStorage.getItem('stockTracker_v2') || '[]');
let newTags = [];

const PRESETS = ['AI','반도체','광통신','데이터센터','클라우드','전기차','배터리','바이오','핀테크','소프트웨어','하드웨어','방산','에너지','소매','네트워크'];

function save() {
  localStorage.setItem('stockTracker_v2', JSON.stringify(stocks));
  renderTable();
  updateMetrics();
}

function switchTab(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'search') populateSelect();
}

function updateMetrics() {
  document.getElementById('m-total').textContent = stocks.length;
  const allSectors = new Set(stocks.flatMap(s => s.sectors));
  document.getElementById('m-sectors').textContent = allSectors.size;
  document.getElementById('m-up').textContent = stocks.filter(s => s.change > 0).length;
  document.getElementById('m-down').textContent = stocks.filter(s => s.change < 0).length;
}

function getChangeClass(c) {
  if (c === undefined || c === null || c === '') return 'flat';
  return c > 0 ? 'up' : c < 0 ? 'down' : 'flat';
}

function formatChange(c) {
  if (c === undefined || c === null || c === '') return '--';
  return (c > 0 ? '+' : '') + parseFloat(c).toFixed(2) + '%';
}

function renderTable() {
  const tbody = document.getElementById('stockBody');
  if (!stocks.length) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="ti ti-database-off"></i>종목이 없습니다.<br>종목 추가 탭에서 추가하거나 샘플 데이터를 로드하세요.</div></td></tr>';
    return;
  }
  tbody.innerHTML = stocks.map((s, i) => `
    <tr>
      <td><span class="ticker-cell">${s.ticker}</span></td>
      <td>${s.name}</td>
      <td>${s.sectors.map(sec => `<span class="tag">${sec}</span>`).join('')}</td>
      <td><span class="price-cell">$${s.price || '--'}</span></td>
      <td><span class="change-cell ${getChangeClass(s.change)}">${formatChange(s.change)}</span></td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteStock(${i})"><i class="ti ti-trash"></i></button></td>
    </tr>`).join('');
}

function deleteStock(i) {
  if (confirm(`${stocks[i].ticker}(${stocks[i].name})을(를) 삭제할까요?`)) {
    stocks.splice(i, 1);
    save();
  }
}

function handleTagInput(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(',', '');
    if (val && !newTags.includes(val)) { newTags.push(val); renderTagWrap(); }
    e.target.value = '';
  }
}

function renderTagWrap() {
  const wrap = document.getElementById('tagWrap');
  const input = document.getElementById('tagInput');
  wrap.innerHTML = '';
  newTags.forEach((t, i) => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.innerHTML = `${t}<button class="tag-rm" onclick="removeTag(${i})">×</button>`;
    wrap.appendChild(span);
  });
  wrap.appendChild(input);
  input.focus();
  renderPresets();
}

function removeTag(i) { newTags.splice(i, 1); renderTagWrap(); }

function renderPresets() {
  const existing = new Set(newTags);
  document.getElementById('presetArea').innerHTML = PRESETS
    .filter(s => !existing.has(s))
    .map(s => `<button class="preset-tag" onclick="addPreset('${s}')">${s}</button>`).join('');
}

function addPreset(s) {
  if (!newTags.includes(s)) { newTags.push(s); renderTagWrap(); }
}

function addStock() {
  const ticker = document.getElementById('newTicker').value.trim().toUpperCase();
  const name = document.getElementById('newName').value.trim();
  if (!ticker || !name) { alert('티커와 종목명을 입력하세요.'); return; }
  if (stocks.find(s => s.ticker === ticker)) { alert('이미 등록된 티커입니다.'); return; }
  stocks.push({ ticker, name, sectors: [...newTags], price: null, change: null, updatedAt: null });
  newTags = [];
  document.getElementById('newTicker').value = '';
  document.getElementById('newName').value = '';
  renderTagWrap();
  save();
  fetchPrice(stocks[stocks.length - 1]).then(() => save());
  alert(`${ticker} 추가 완료!`);
}

async function fetchPrice(stock) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        messages: [{ role: 'user', content: `Return ONLY valid JSON for stock "${stock.ticker}": {"price": 123.45, "change": 1.23} where change is today's % change. Use realistic recent data. No explanation, no markdown.` }]
      })
    });
    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const match = text.match(/\{[\s\S]*?\}/);
    if (match) {
      const parsed = JSON.parse(match[0]);
      stock.price = parsed.price ? parseFloat(parsed.price).toFixed(2) : null;
      stock.change = parsed.change !== undefined ? parseFloat(parseFloat(parsed.change).toFixed(2)) : null;
      stock.updatedAt = new Date().toLocaleString('ko-KR');
    }
  } catch (e) { console.error(stock.ticker, e); }
}

async function updateAllPrices() {
  if (!stocks.length) { alert('종목이 없습니다.'); return; }
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  dot.className = 'dot loading';
  for (let i = 0; i < stocks.length; i++) {
    statusText.textContent = `주가 업데이트 중... (${i + 1}/${stocks.length}) ${stocks[i].ticker}`;
    await fetchPrice(stocks[i]);
    save();
  }
  dot.className = 'dot';
  const now = new Date().toLocaleString('ko-KR');
  statusText.textContent = '업데이트 완료';
  document.getElementById('lastUpdate').textContent = '최종: ' + now;
}

function populateSelect() {
  const sel = document.getElementById('searchTicker');
  sel.innerHTML = '<option value="">조회할 종목 선택...</option>';
  stocks.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.ticker;
    opt.textContent = `${s.ticker} — ${s.name}`;
    sel.appendChild(opt);
  });
}

function searchRelated() {
  const ticker = document.getElementById('searchTicker').value;
  if (!ticker) { alert('종목을 선택하세요.'); return; }
  const base = stocks.find(s => s.ticker === ticker);
  if (!base) return;
  const results = document.getElementById('searchResults');
  if (!base.sectors.length) {
    results.innerHTML = '<div class="empty-state"><i class="ti ti-tag-off"></i>분야 태그가 없습니다.</div>';
    return;
  }

  let html = `<div class="base-stock-info">
    <div>
      <span style="font-weight:700;font-size:16px;">${base.ticker}</span>
      <span style="color:var(--text-muted);margin-left:8px;">${base.name}</span>
      <div style="margin-top:4px;">${base.sectors.map(s => `<span class="tag">${s}</span>`).join('')}</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:18px;font-weight:700;">$${base.price || '--'}</div>
      <div class="${getChangeClass(base.change)}" style="font-weight:600;">${formatChange(base.change)}</div>
    </div>
  </div>`;

  base.sectors.forEach(sector => {
    const related = stocks.filter(s => s.ticker !== ticker && s.sectors.includes(sector));
    html += `<div class="card search-result" style="overflow:hidden;">
      <div class="sector-label"><i class="ti ti-tag"></i> ${sector} — ${related.length}개 연관 종목</div>
      <table>
        <thead><tr><th>티커</th><th>종목명</th><th>현재가</th><th>등락률</th><th>기타 분야</th></tr></thead>
        <tbody>${related.length
        ? related.map(s => `<tr>
            <td><span class="ticker-cell">${s.ticker}</span></td>
            <td>${s.name}</td>
            <td><span class="price-cell">$${s.price || '--'}</span></td>
            <td><span class="change-cell ${getChangeClass(s.change)}">${formatChange(s.change)}</span></td>
            <td>${s.sectors.filter(sec => sec !== sector).map(sec => `<span class="tag">${sec}</span>`).join('') || '<span style="color:var(--text-hint)">—</span>'}</td>
          </tr>`).join('')
        : '<tr><td colspan="5"><div class="empty-state" style="padding:1rem;">해당 분야의 다른 종목이 없습니다.</div></td></tr>'}
        </tbody>
      </table>
    </div>`;
  });
  results.innerHTML = html;
}

function exportCSV() {
  if (!stocks.length) { alert('내보낼 데이터가 없습니다.'); return; }
  const header = '티커,종목명,분야(|구분),현재가,등락률(%),업데이트시각\n';
  const rows = stocks.map(s =>
    `${s.ticker},"${s.name}","${s.sectors.join('|')}",${s.price || ''},${s.change !== null ? s.change : ''},"${s.updatedAt || ''}"`
  ).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `stock_tracker_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.replace(/^\uFEFF/, '').split('\n').filter(l => l.trim());
    let imported = 0;
    lines.slice(1).forEach(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (let ch of line) {
        if (ch === '"') inQ = !inQ;
        else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
        else cur += ch;
      }
      cols.push(cur);
      const ticker = (cols[0] || '').trim().toUpperCase();
      if (ticker && !stocks.find(s => s.ticker === ticker)) {
        stocks.push({
          ticker,
          name: (cols[1] || ticker).trim(),
          sectors: cols[2] ? cols[2].split('|').filter(Boolean) : [],
          price: cols[3] ? cols[3].trim() : null,
          change: cols[4] ? parseFloat(cols[4]) : null,
          updatedAt: cols[5] ? cols[5].trim() : null
        });
        imported++;
      }
    });
    save();
    alert(`${imported}개 종목을 가져왔습니다.`);
  };
  reader.readAsText(file, 'utf-8');
  input.value = '';
}
